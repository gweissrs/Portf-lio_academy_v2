<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="0" y="0" width="32" height="32" rx="6" fill="#0a0a14"/>
  <rect x="0" y="0" width="32" height="32" rx="6" fill="none" stroke="rgba(110,50,220,0.5)" stroke-width="3"/>
  <rect x="1.5" y="1.5" width="29" height="29" rx="5" fill="none" stroke="#a86eff" stroke-width="1.2" filter="url(#glow)"/>
  <text x="16" y="23" font-family="Arial Black, Arial, sans-serif" font-weight="900"
        font-size="18" fill="#e1cdff" text-anchor="middle" filter="url(#glow)">GW</text>
</svg>
